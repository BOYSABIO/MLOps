steps: ["data_load", "data_preprocess", "model", "evaluation"]

model:
  batch_size: 32
  epochs: 5
  learning_rate: 0.001
  input_shape: [1, 28, 28]
  num_classes: 10
  save_path: models/pytorch_mnist_model.pth

data_load:
  data_dir: data/raw/

data_preprocess:
  normalize: true
  output_dir: data/processed/

evaluation:
  report_dir: reports/
  confusion_matrix_path: reports/figures/confusion_matrix.png
