# config.yaml

data:
  raw_path: "data/raw"
  processed_path: "data/processed"

model:
  save_path: "models/mnist-model.h5"
  input_shape: [28, 28, 1]
  num_classes: 10
  epochs: 10
  batch_size: 32

logging:
  log_file: "logs/main_log.log"

evaluation:
  metrics: ["accuracy"]

preprocessing:
  normalize: true
