name: num_detect_env
channels:       # Where conda finds default packages
  - conda-forge
  - defaults
dependencies:   # Latest packages in Conda
  - python=3.9
  - pip
  - numpy
  - pandas
  - scipy
  - matplotlib
  - torch=1.12.0
  - torchvision=0.13.0
  - torchaudio
  - tqdm
  - pip:      # Latest packages in pip
      - opencv-python
      - ultralytics
      - ultralytics-thop